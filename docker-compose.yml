services:
  bunqueue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bunqueue
    ports:
      - "6789:6789" # TCP Protocol
      - "6790:6790" # HTTP API
    volumes:
      - bunqueue-data:/app/data
    environment:
      - TCP_PORT=6789
      - HTTP_PORT=6790
      - DATA_PATH=/app/data/bunqueue.db
      - NODE_ENV=production
      # Uncomment to enable auth
      # - AUTH_TOKENS=your-secret-token
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:6790/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # Optional: Development with hot reload
  bunqueue-dev:
    image: oven/bun:1-alpine
    container_name: bunqueue-dev
    working_dir: /app
    ports:
      - "6789:6789"
      - "6790:6790"
    volumes:
      - .:/app
      - /app/node_modules
      - bunqueue-dev-data:/app/data
    environment:
      - TCP_PORT=6789
      - HTTP_PORT=6790
      - DATA_PATH=/app/data/bunqueue.db
      - NODE_ENV=development
    command: bun run dev
    profiles:
      - dev

  # Monitoring Stack
  prometheus:
    image: prom/prometheus:latest
    container_name: bunqueue-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/alert_rules.yml:/etc/prometheus/alert_rules.yml
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
    restart: unless-stopped
    profiles:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    container_name: bunqueue-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=bunqueue
      - GF_USERS_ALLOW_SIGN_UP=false
    restart: unless-stopped
    depends_on:
      - prometheus
    profiles:
      - monitoring

volumes:
  bunqueue-data:
  bunqueue-dev-data:
  prometheus-data:
  grafana-data:
