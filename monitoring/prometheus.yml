global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert_rules.yml

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'bunqueue'
    scrape_interval: 5s
    static_configs:
      - targets: ['bunqueue:6790']
    metrics_path: /prometheus
    # Uncomment if auth is enabled:
    # bearer_token: 'your-secret-token'
