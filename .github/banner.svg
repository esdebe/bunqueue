<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="pinkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f9a8d4"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
    <linearGradient id="lightPink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fce7f3"/>
      <stop offset="100%" style="stop-color:#fbcfe8"/>
    </linearGradient>
  </defs>

  <!-- Logo centered -->
  <g transform="translate(100, 100)">
    <!-- Pink box background -->
    <rect x="-50" y="-50" width="100" height="100" rx="20" fill="url(#pinkGrad)"/>

    <!-- Left ear -->
    <ellipse cx="-16" cy="-32" rx="8" ry="20" fill="white" opacity="0.9"/>
    <ellipse cx="-16" cy="-32" rx="4" ry="14" fill="url(#lightPink)"/>

    <!-- Right ear -->
    <ellipse cx="16" cy="-32" rx="8" ry="20" fill="white" opacity="0.9"/>
    <ellipse cx="16" cy="-32" rx="4" ry="14" fill="url(#lightPink)"/>

    <!-- Head -->
    <circle cx="0" cy="0" r="28" fill="white" opacity="0.95"/>

    <!-- Eyes -->
    <ellipse cx="-10" cy="-4" rx="5" ry="6" fill="#18181b"/>
    <ellipse cx="10" cy="-4" rx="5" ry="6" fill="#18181b"/>
    <circle cx="-8" cy="-6" r="2" fill="white"/>
    <circle cx="12" cy="-6" r="2" fill="white"/>

    <!-- Nose -->
    <ellipse cx="0" cy="8" rx="4" ry="3" fill="#be185d"/>

    <!-- Mouth -->
    <path d="M -6 14 Q 0 20 6 14" stroke="#be185d" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  </g>
</svg>
