<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#ea580c"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fdba74"/>
      <stop offset="100%" style="stop-color:#fb923c"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="28" fill="#1f2937"/>

  <!-- Bunny -->
  <g transform="translate(64, 72)">
    <!-- Body -->
    <circle cx="0" cy="0" r="36" fill="url(#g1)"/>

    <!-- Left ear -->
    <ellipse cx="-20" cy="-42" rx="10" ry="26" fill="url(#g1)"/>
    <ellipse cx="-20" cy="-42" rx="5" ry="17" fill="url(#g2)"/>

    <!-- Right ear -->
    <ellipse cx="20" cy="-42" rx="10" ry="26" fill="url(#g1)"/>
    <ellipse cx="20" cy="-42" rx="5" ry="17" fill="url(#g2)"/>

    <!-- Eyes -->
    <circle cx="-12" cy="-6" r="5" fill="#1f2937"/>
    <circle cx="12" cy="-6" r="5" fill="#1f2937"/>
    <circle cx="-10" cy="-8" r="2" fill="white"/>
    <circle cx="14" cy="-8" r="2" fill="white"/>

    <!-- Nose -->
    <ellipse cx="0" cy="10" rx="4" ry="3" fill="#1f2937"/>

    <!-- Q tail -->
    <path d="M 28 20 L 42 38" stroke="url(#g1)" stroke-width="7" stroke-linecap="round"/>
    <circle cx="42" cy="38" r="4" fill="#f97316"/>
  </g>
</svg>
